render:
  width: 256
  height: 256
  samples: 32
  engine: "BLENDER_EEVEE"

  background_color: [0.0, 0.0, 0.0, 0.0]  

camera:
  elevation_deg_range: [25, 50]
  azimuth_deg_range: [0, 360]
  distance_range: [2.5, 4.5]
  fov_deg_range: [25, 40]
  height_offset_range: [-0.1, 0.1]

lighting:
  key:
    energy_range: [3.0, 6.0]
    elevation_deg_range: [40, 80]
    azimuth_deg_range: [0, 360]
    color_temp_range: [5500, 6500]
  fill:
    energy_range: [0.5, 2.0]
    color_temp_range: [4500, 6500]
  ambient:
    energy_range: [0.2, 0.8]

augmentation:
  animation:
    sample_random_frame: true
  model_yaw_jitter_deg: [-15, 15]

dataset:
  renders_per_class: 50
